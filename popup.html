<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Tab Sleep Settings</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      padding: 16px;
    }
    input {
      width: 80px;
    }
  </style>
</head>
<body>
  <label>
    Sleep tabs after
    <input type="number" id="sleepTime" min="1" step="1" />
    minutes
  </label>
  <label>
    Force sleep all tabs
    <button id="forceSleep">Sleep Now</button>
  </label>

  <div>Sleep Tab:
    <button id="sleepLeft">Sleep Left</button>
    <button id="sleepRight">Sleep Right</button>
  </div>

  <div>Wake Tab:
    <button id="wakeLeft">Wake Left</button>
    <button id="wakeRight">Wake Right</button>
  </div>

  <label>
    Wake all sleeping tabs
    <button id="wakeButton">Wake All</button>
  </label>

  <hr>
  <div class="whitelist">
      <h4>Never Sleep These Sites:</h4>
      <div>
          <input type="text" id="input" placeholder="e.g. youtube.com">
          <button id="add-white">Add</button>
      </div>
      <ul id="whitelistt"></ul>
  </div>

  <script src="popup.js"></script>
</body>
</html>
